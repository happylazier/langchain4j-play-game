<!doctype html>
<html lang="zh">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI 聊天</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>会话</h3>
            <button id="newSession" class="create-btn" title="新建会话">新建</button>
        </div>
        <div class="sessions" id="sessions"></div>
        <div style="padding:10px;border-top:1px solid #f0f4fb;">
            <div class="small">会话会保存在浏览器本地，会话 ID 将在发送请求时随请求体发送给后端。</div>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <div class="title" id="sessionTitle">未选择会话</div>
            <div class="muted" id="sessionIdDisplay"></div>
        </div>

        <div class="chat-window">
            <div class="chat-container" id="chat"></div>
        </div>

        <div class="footer">
            <form id="form" style="display:flex;flex:1;gap:8px;" onsubmit="return false;">
                <textarea id="input" aria-label="消息输入" placeholder="输入消息，按 Enter 发送，Shift+Enter 换行" rows="1"></textarea>
                <button id="send" class="btn-send">发送</button>
            </form>
        </div>
    </div>
</div>

<script src="/app.js" defer></script>
</body>
</html>
